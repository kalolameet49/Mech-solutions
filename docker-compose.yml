version: "3.9"

services:
  redis:
    image: redis:7

  web:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./files:/app/files
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A worker.celery worker --loglevel=info
    volumes:
      - ./files:/app/files
    depends_on:
      - redis
